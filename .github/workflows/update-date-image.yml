name: Update SAP Statement Date Image

on:
  schedule:
    # Runs daily at 00:15 IST.
    # GitHub cron uses UTC, so 00:15 IST = 18:45 UTC previous day.
    - cron: "45 18 * * *"

  # This allows you to run it manually from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-date-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: pip install pillow

      - name: Generate date image
        run: |
          python - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          # SAP statement date image timezone
          today = datetime.now(ZoneInfo("Asia/Kolkata"))

          # Date format shown in image
          date_text = today.strftime("%d-%b-%Y")
          text = f"Date: {date_text}"

          # Image size
          width = 280
          height = 45

          # Create white background image
          img = Image.new("RGB", (width, height), "white")
          draw = ImageDraw.Draw(img)

          # Use available Linux fonts on GitHub runner
          font_paths = [
              "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
              "/usr/share/fonts/truetype/liberation2/LiberationSans-Bold.ttf"
          ]

          font = None
          for path in font_paths:
              if os.path.exists(path):
                  font = ImageFont.truetype(path, 18)
                  break

          if font is None:
              font = ImageFont.load_default()

          # Calculate text position
          bbox = draw.textbbox((0, 0), text, font=font)
          text_width = bbox[2] - bbox[0]
          text_height = bbox[3] - bbox[1]

          # Right-align text inside image
          x = width - text_width - 10
          y = (height - text_height) // 2 - 2

          draw.text((x, y), text, fill="black", font=font)

          # Save image at repository root
          img.save("date.png")
          PY

      - name: Commit and push updated date image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add date.png
          git commit -m "Update SAP statement date image" || echo "No changes to commit"
          git push
